version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: task-management-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskmanagementdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - task-management-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Task Management API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-management-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=taskmanagementdb;Username=postgres;Password=postgres;SSL Mode=Disable"
      Jwt__Key: "your-super-secret-key-minimum-32-characters-change-this-in-production"
      Jwt__Issuer: "TaskManagementAPI"
      Jwt__Audience: "TaskManagementAPI"
      Jwt__ExpirationMinutes: "60"
      Logging__LogLevel__Default: "Information"
      Logging__LogLevel__Microsoft: "Warning"
    ports:
      - "5000:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - task-management-network
    volumes:
      - ./TaskManagementAPI:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: task-management-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taskmanagement.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - task-management-network
    depends_on:
      - postgres

volumes:
  postgres-data:
    driver: local

networks:
  task-management-network:
    driver: bridge
